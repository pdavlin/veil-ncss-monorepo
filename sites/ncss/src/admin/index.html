<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Content Manager — Veil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Netlify Identity widget: lets editors sign in to the CMS. Pair this
         with backend.name = git-gateway in config.yml so commits go through
         Netlify's Git Gateway to the connected GitHub repo. -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      // bounce un-authenticated users to the login flow, then back to /admin/
      // once they've signed in via Identity.
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on('init', function (user) {
          if (!user) {
            window.netlifyIdentity.on('login', function () {
              document.location.href = '/admin/';
            });
          }
        });
      }
    </script>
  </body>
</html>
