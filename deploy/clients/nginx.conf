server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;

    # Don't expose directory listings
    autoindex off;

    # Serve index.html where present, fall through to 404 otherwise
    location / {
        try_files $uri $uri/ =404;
    }

    # Long cache for hashed-or-stable static assets (screenshots, fonts)
    location ~* \.(png|jpe?g|gif|webp|avif|svg|woff2?|ico)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # HTML should revalidate so updates appear immediately
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Tighter defaults
    server_tokens off;
    charset utf-8;
}
