name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint (workspace + components)
        run: |
          pnpm -r run lint
          pnpm exec tsx tools/lint-components.ts

      # build packages before tests so tokens-veil's brand-leak and
      # pairings tests can see the dist files. without this they race
      # the e2e test's beforeAll build hook and fail on a fresh checkout.
      - name: Build packages
        run: pnpm -r --filter "./packages/**" run build

      - name: Unit tests
        run: pnpm -r run test

      - name: Build Veil site
        run: pnpm --filter @veil-ncss/site-veil run build

      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: A11y check (Veil)
        run: pnpm exec tsx scripts/a11y-check.ts sites/veil/_site

      - name: Two-brand smoke
        run: pnpm exec tsx scripts/two-brand-smoke.ts

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        site: [veil, ncss]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages + site
        run: |
          pnpm -r --filter "./packages/**" run build
          pnpm --filter @veil-ncss/site-${{ matrix.site }} run build

      # staticDistDir is an LHCI config option, not an action input — the
      # action silently drops it from `with:` and then treats the bare
      # paths in `urls` as invalid URLs. It has to come in via configPath;
      # LHCI serves _site itself and swaps the real port into the url list.
      - name: Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./lighthouserc.${{ matrix.site }}.json
          uploadArtifacts: true
          artifactName: lighthouse-results-${{ matrix.site }}
          temporaryPublicStorage: true

      # Surface scores + report links as a sticky per-site PR comment so
      # nobody has to dig through the action logs for the storage URLs.
      - name: Comment scores on PR
        if: github.event_name == 'pull_request' && steps.lighthouse.outputs.resultsPath != ''
        uses: actions/github-script@v7
        env:
          RESULTS_PATH: ${{ steps.lighthouse.outputs.resultsPath }}
          SITE: ${{ matrix.site }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = process.env.RESULTS_PATH;
            const site = process.env.SITE;
            const manifest = JSON.parse(fs.readFileSync(path.join(dir, 'manifest.json'), 'utf8'));
            let links = {};
            try { links = JSON.parse(fs.readFileSync(path.join(dir, 'links.json'), 'utf8')); } catch {}
            const pct = (s) => (s == null ? '—' : Math.round(s * 100));
            const rows = manifest.filter((r) => r.isRepresentativeRun).map((r) => {
              const page = new URL(r.url).pathname;
              const link = links[r.url] ? `[report](${links[r.url]})` : '—';
              const s = r.summary;
              return `| \`${page}\` | ${pct(s.performance)} | ${pct(s.accessibility)} | ${pct(s['best-practices'])} | ${pct(s.seo)} | ${link} |`;
            });
            const marker = `<!-- lighthouse-comment:${site} -->`;
            const body = [
              marker,
              `### Lighthouse — ${site} (${context.payload.pull_request.head.sha.slice(0, 7)})`,
              '',
              '| Page | Perf | A11y | Best practices | SEO | Report |',
              '|---|---|---|---|---|---|',
              ...rows,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }

  # Google-calibrated Lighthouse via the PageSpeed Insights API, run
  # against the Netlify deploy preview once it's live. Complements the
  # runner-hosted lighthouse job above, whose perf scores are depressed
  # by shared-runner CPU. Keyless PSI is rate-limited and can flake;
  # set the PSI_API_KEY secret to make it reliable.
  psi:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 15

    permissions:
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - site: veil
            host: veil-monorepo
            pages: '["/", "/services/"]'
          - site: ncss
            host: ncss-monorepo
            pages: '["/", "/capabilities/"]'

    steps:
      - name: PSI against deploy preview
        uses: actions/github-script@v7
        env:
          SITE: ${{ matrix.site }}
          HOST: ${{ matrix.host }}
          PAGES: ${{ matrix.pages }}
          PSI_KEY: ${{ secrets.PSI_API_KEY }}
        with:
          script: |
            const site = process.env.SITE;
            const pages = JSON.parse(process.env.PAGES);
            const key = process.env.PSI_KEY || '';
            const preview = `https://deploy-preview-${context.issue.number}--${process.env.HOST}.netlify.app`;
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

            // Wait for the Netlify preview to come up (it builds in parallel with CI).
            let live = false;
            for (let i = 0; i < 32; i++) {
              try {
                const res = await fetch(preview, { redirect: 'follow' });
                if (res.ok) { live = true; break; }
              } catch {}
              await sleep(15000);
            }
            if (!live) { core.setFailed(`deploy preview never came up: ${preview}`); return; }

            const cats = ['PERFORMANCE', 'ACCESSIBILITY', 'BEST_PRACTICES', 'SEO'];
            const pct = (c) => (c && c.score != null ? Math.round(c.score * 100) : '—');
            const rows = [];
            for (const page of pages) {
              const target = preview + page;
              const api = 'https://www.googleapis.com/pagespeedonline/v5/runPagespeed?url='
                + encodeURIComponent(target) + '&strategy=mobile'
                + cats.map((c) => `&category=${c}`).join('')
                + (key ? `&key=${key}` : '');
              let scores = null;
              for (let attempt = 0; attempt < 3 && !scores; attempt++) {
                if (attempt) await sleep(10000);
                try {
                  const res = await fetch(api);
                  if (!res.ok) { core.warning(`PSI ${res.status} for ${target}`); continue; }
                  const c = (await res.json()).lighthouseResult.categories;
                  scores = [c.performance, c.accessibility, c['best-practices'], c.seo].map(pct);
                } catch (e) { core.warning(`PSI error for ${target}: ${e.message}`); }
              }
              const ui = `https://pagespeed.web.dev/analysis?url=${encodeURIComponent(target)}`;
              rows.push(`| \`${page}\` | ${(scores ?? ['—', '—', '—', '—']).join(' | ')} | [rerun](${ui}) |`);
              await sleep(2000);
            }

            const marker = `<!-- psi-comment:${site} -->`;
            const body = [
              marker,
              `### PageSpeed Insights — ${site} (${context.payload.pull_request.head.sha.slice(0, 7)})`,
              '',
              `Deploy preview: ${preview} · mobile strategy, Google-hosted hardware`,
              '',
              '| Page | Perf | A11y | Best practices | SEO | PSI |',
              '|---|---|---|---|---|---|',
              ...rows,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number, per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body });
            }
