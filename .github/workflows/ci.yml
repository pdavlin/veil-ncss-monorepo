name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint (workspace + components)
        run: |
          pnpm -r run lint
          pnpm exec tsx tools/lint-components.ts

      - name: Unit tests
        run: pnpm -r run test

      - name: Build packages
        run: pnpm -r --filter "./packages/**" run build

      - name: Build Veil site
        run: pnpm --filter @veil-ncss/site-veil run build

      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: A11y check (Veil)
        run: pnpm exec tsx scripts/a11y-check.ts sites/veil/_site

      - name: Two-brand smoke
        run: pnpm exec tsx scripts/two-brand-smoke.ts

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages + Veil
        run: |
          pnpm -r --filter "./packages/**" run build
          pnpm --filter @veil-ncss/site-veil run build

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            file://${{ github.workspace }}/sites/veil/_site/index.html
            file://${{ github.workspace }}/sites/veil/_site/services/index.html
          uploadArtifacts: true
          temporaryPublicStorage: true
