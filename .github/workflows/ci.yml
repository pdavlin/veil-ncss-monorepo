name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r run typecheck

      - name: Lint (workspace + components)
        run: |
          pnpm -r run lint
          pnpm exec tsx tools/lint-components.ts

      # build packages before tests so tokens-veil's brand-leak and
      # pairings tests can see the dist files. without this they race
      # the e2e test's beforeAll build hook and fail on a fresh checkout.
      - name: Build packages
        run: pnpm -r --filter "./packages/**" run build

      - name: Unit tests
        run: pnpm -r run test

      - name: Build Veil site
        run: pnpm --filter @veil-ncss/site-veil run build

      - name: Install Playwright (chromium)
        run: pnpm exec playwright install --with-deps chromium

      - name: A11y check (Veil)
        run: pnpm exec tsx scripts/a11y-check.ts sites/veil/_site

      - name: Two-brand smoke
        run: pnpm exec tsx scripts/two-brand-smoke.ts

  lighthouse:
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages + Veil
        run: |
          pnpm -r --filter "./packages/**" run build
          pnpm --filter @veil-ncss/site-veil run build

      # staticDistDir is an LHCI config option, not an action input — the
      # action silently drops it from `with:` and then treats the bare
      # paths in `urls` as invalid URLs. It has to come in via configPath;
      # LHCI serves _site itself and swaps the real port into the url list.
      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
